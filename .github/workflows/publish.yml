# Publishes to npm when a git tag matching `v*.*.*` is pushed.
#
# Auth: npm Trusted Publishing via OIDC. The package on npmjs.com is
# configured with this repo + this workflow filename as a trusted
# publisher; the npm CLI exchanges GitHub's id-token for a short-lived
# publish credential at run time. No long-lived NPM_TOKEN secret.
#
# Release process:
#   1. bump `version` in package.json
#   2. commit + push to main, wait for CI green
#   3. git tag v0.3.1 && git push origin v0.3.1
#   4. this workflow runs and publishes to npm
#
# The workflow re-runs the full test suite before publishing — a tag with
# failing tests will not ship.

name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for the OIDC token Trusted Publishing consumes
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # npm CLI bundled with Node 20 is 10.x; Trusted Publishing needs >=11.5.1
      # for the OIDC token exchange. Upgrading globally is the simplest way to
      # make sure `npm publish` reaches the version gate regardless of which
      # Node minor the runner has cached.
      - name: Upgrade npm CLI for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public
