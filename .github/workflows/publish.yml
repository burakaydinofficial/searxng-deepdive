# Publishes to npm AND the official MCP Registry when a git tag matching
# `v*.*.*` is pushed.
#
# Auth (npm):     Trusted Publishing via OIDC. npmjs.com has this repo +
#                 workflow registered as a trusted publisher; the npm CLI
#                 exchanges GitHub's id-token for a short-lived publish
#                 credential at run time. No long-lived NPM_TOKEN secret.
# Auth (MCP Reg): GitHub OIDC. mcp-publisher exchanges the same id-token
#                 for an authorized session against
#                 registry.modelcontextprotocol.io, scoped to the
#                 io.github.<owner>/ namespace claimed by this repo's
#                 OIDC subject. No registry-side pre-config beyond the
#                 namespace match.
#
# Release process:
#   1. bump `version` in package.json
#   2. commit + push to main, wait for the Test workflow green
#   3. git tag v0.4.0 && git push origin v0.4.0
#   4. this workflow runs:
#        - re-runs the full test suite (tag with failing tests won't ship)
#        - publishes the npm tarball with provenance
#        - rewrites server.json's version fields to match the tag
#        - publishes the registry entry via OIDC
#
# server.json on disk is the source of truth for description, env vars,
# transport — but its `version` fields get overwritten transiently here
# by the tag, so contributors don't have to remember to bump them in
# lockstep with package.json.

name: Publish to npm + MCP Registry

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for the OIDC token Trusted Publishing consumes
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # npm CLI bundled with Node 20 is 10.x; Trusted Publishing needs >=11.5.1
      # for the OIDC token exchange. Upgrading globally is the simplest way to
      # make sure `npm publish` reaches the version gate regardless of which
      # Node minor the runner has cached.
      - name: Upgrade npm CLI for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public

      # ---------------------------------------------------------------
      # MCP Registry publish (after npm so the registry never points at
      # a version that doesn't yet exist on npm).
      # ---------------------------------------------------------------

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Sync server.json version with the release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('node:fs');
            const path = './server.json';
            const s = JSON.parse(fs.readFileSync(path, 'utf8'));
            s.version = process.argv[1];
            for (const pkg of (s.packages ?? [])) pkg.version = process.argv[1];
            fs.writeFileSync(path, JSON.stringify(s, null, 2) + '\n');
          " "$VERSION"
          echo "server.json synced to version $VERSION"

      - name: Authenticate to MCP Registry via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
